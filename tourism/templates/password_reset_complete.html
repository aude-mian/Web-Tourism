{% extends 'base/base.html' %}

{% block content %}
<div class="auth-container">
    <div class="auth-card">
        <h2 class="auth-title">Mot de passe réinitialisé</h2>
        
        <div class="auth-message">
            <p>Votre mot de passe a été défini avec succès. Vous pouvez maintenant vous connecter avec votre nouveau mot de passe.</p>
        </div>
        
        <div class="auth-links">
            <a href="{% url 'login' %}" class="auth-button">Se connecter</a>
        </div>
    </div>
</div>
{% endblock %}
